<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Apprendre le français — 10 jours</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;900&display=swap" rel="stylesheet">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#2563eb">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Français 10">
<link rel="apple-touch-icon" href="icon-192x192.png">
<link rel="icon" href="icon-192x192.png">
<style>
:root{
  --bg:#f0f4ff;--bg2:#e8eeff;--white:#ffffff;--blue:#2563eb;--blue2:#1d4ed8;
  --blue3:#dbeafe;--blue4:#eff6ff;--green:#059669;--green2:#d1fae5;
  --amber:#d97706;--amber2:#fef3c7;--red:#dc2626;--red2:#fee2e2;
  --text:#1e293b;--text2:#475569;--text3:#94a3b8;--border:#cbd5e1;
  --border2:#e2e8f0;--shadow:0 1px 4px rgba(37,99,235,.08);
  --shadow2:0 4px 16px rgba(37,99,235,.12);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Poppins',Arial,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.wrap{max-width:900px;margin:0 auto;padding:20px 14px}
.topbar{background:var(--white);border:1px solid var(--border2);border-radius:16px;padding:14px 20px;margin-bottom:16px;display:flex;align-items:center;justify-content:space-between;box-shadow:var(--shadow)}
.logo{display:flex;align-items:center;gap:10px}
.logo-flag{font-size:1.6rem}
.logo-title{font-size:1rem;font-weight:700;color:var(--text)}
.logo-sub{font-size:.7rem;color:var(--text3);margin-top:1px}
.topbar-right{display:flex;align-items:center;gap:16px}
.ov-stat{text-align:center}
.ov-val{font-size:1.1rem;font-weight:700;color:var(--blue)}
.ov-lbl{font-size:.68rem;color:var(--text3)}
.ov-ring{position:relative;width:52px;height:52px}
.ov-ring svg{transform:rotate(-90deg)}
.ov-ring-pct{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:.72rem;font-weight:700;color:var(--blue)}
.prog-bar-wrap{background:var(--white);border:1px solid var(--border2);border-radius:12px;padding:12px 18px;margin-bottom:14px;box-shadow:var(--shadow)}
.prog-labels{display:flex;justify-content:space-between;font-size:.8rem;margin-bottom:8px;color:var(--text2)}
.prog-track{height:8px;background:var(--bg2);border-radius:99px;overflow:hidden}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--blue),#60a5fa);border-radius:99px;transition:width .5s}
.tabs-wrap{background:var(--white);border:1px solid var(--border2);border-radius:14px;padding:12px;margin-bottom:16px;box-shadow:var(--shadow)}
.tabs{display:flex;gap:6px;overflow-x:auto;scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tab{flex-shrink:0;min-width:68px;padding:8px 10px;border-radius:10px;border:1.5px solid var(--border2);background:var(--bg);cursor:pointer;text-align:center;font-family:'Poppins',Arial,sans-serif;transition:all .2s}
.tab:hover:not(.tlocked){border-color:var(--blue);background:var(--blue4)}
.tab.tactive{background:var(--blue);border-color:var(--blue);color:#fff}
.tab.tactive .tab-lbl{color:#ffffffbb}
.tab.tdone{background:var(--green2);border-color:var(--green)}
.tab.tdone .tab-num{color:var(--green)}
.tab.tlocked{opacity:.35;cursor:not-allowed}
.tab-num{font-size:.9rem;font-weight:700;display:block;color:var(--text)}
.tab-lbl{font-size:.62rem;color:var(--text2);display:block;margin-top:1px}
.tab-dots{display:flex;gap:3px;justify-content:center;margin-top:5px}
.tdot{width:7px;height:7px;border-radius:50%;background:var(--border)}
.tdot.listen.on{background:var(--blue)}
.tdot.read.on{background:var(--green)}
.tdot.speak.on{background:var(--amber)}
.hero{background:linear-gradient(135deg,var(--blue),var(--blue2));border-radius:18px;padding:22px 24px;margin-bottom:16px;color:#fff;display:flex;align-items:center;justify-content:space-between;gap:14px;position:relative;overflow:hidden;box-shadow:var(--shadow2)}
.hero::after{content:'🇫🇷';position:absolute;right:-10px;top:-10px;font-size:100px;opacity:.07;pointer-events:none}
.hero-l{display:flex;align-items:center;gap:14px}
.hero-num{width:54px;height:54px;border-radius:14px;background:rgba(255,255,255,.2);border:2px solid rgba(255,255,255,.3);display:flex;align-items:center;justify-content:center;font-size:1.4rem;font-weight:900;flex-shrink:0}
.hero-title{font-size:1.1rem;font-weight:700}
.hero-topic{font-size:.8rem;opacity:.85;margin-top:3px}
.hero-badge{background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.3);border-radius:10px;padding:7px 14px;font-size:.78rem;white-space:nowrap}
.phases{display:grid;gap:14px;margin-bottom:16px}
.pcard{background:var(--white);border:1.5px solid var(--border2);border-radius:18px;overflow:hidden;box-shadow:var(--shadow);transition:border-color .2s}
.pcard.pdone{border-color:var(--green)}
.pcard.pdone .ptop{background:var(--green2)}
.ptop{padding:16px 20px;display:flex;align-items:center;gap:12px;cursor:pointer;user-select:none;transition:background .15s;background:var(--white)}
.ptop:hover{background:var(--blue4)}
.pcard.pdone .ptop:hover{background:#bbf7d0}
.picon{width:46px;height:46px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:1.3rem;flex-shrink:0}
.picon.listen{background:var(--blue3)}
.picon.read{background:var(--green2)}
.picon.speak{background:var(--amber2)}
.pmeta{flex:1}
.pname{font-size:.95rem;font-weight:700;color:var(--text)}
.pdur{font-size:.75rem;color:var(--text2);margin-top:2px}
.pbadge{padding:4px 12px;border-radius:99px;font-size:.7rem;font-weight:700}
.pb-done{background:var(--green2);color:var(--green)}
.pb-open{background:var(--blue3);color:var(--blue)}
.pb-lock{background:var(--bg2);color:var(--text3)}
.pbody{display:none;padding:0 20px 20px;border-top:1.5px solid var(--border2)}
.pbody.open{display:block}
.res-lbl{font-size:.72rem;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.8px;margin:14px 0 8px}
.res-link{display:flex;align-items:center;gap:12px;background:var(--bg);border:1.5px solid var(--border2);border-radius:12px;padding:12px 14px;text-decoration:none;color:var(--text);transition:all .15s;cursor:pointer}
.res-link:hover{border-color:var(--blue);background:var(--blue4);box-shadow:var(--shadow)}
.res-icon{font-size:1.3rem;flex-shrink:0}
.res-name{font-size:.85rem;font-weight:600;color:var(--text)}
.res-url{font-size:.7rem;color:var(--text3);margin-top:2px}
.res-arrow{color:var(--blue);font-size:.9rem;flex-shrink:0}
.speak-box{background:var(--amber2);border:1.5px solid #fcd34d;border-radius:14px;padding:14px 16px;margin:12px 0}
.speak-lbl{font-size:.7rem;font-weight:700;color:var(--amber);text-transform:uppercase;letter-spacing:.8px;margin-bottom:5px}
.speak-text{font-size:.92rem;font-weight:700;color:var(--text)}
.speak-ref{font-size:.75rem;color:var(--text2);margin-top:6px}
.timer-section{background:var(--blue4);border:1.5px solid var(--blue3);border-radius:14px;padding:18px;margin:14px 0;text-align:center}
.timer-lbl-top{font-size:.75rem;font-weight:700;color:var(--blue);text-transform:uppercase;letter-spacing:.8px;margin-bottom:12px}
.timer-ring-wrap{position:relative;display:inline-block;margin-bottom:12px}
.timer-ring-wrap svg{transform:rotate(-90deg)}
.timer-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.timer-num{font-size:1.9rem;font-weight:700;color:var(--blue);direction:ltr;font-variant-numeric:tabular-nums}
.timer-num.run{color:var(--green)}
.timer-num.done{color:var(--amber)}
.timer-sub{font-size:.7rem;color:var(--text3);margin-top:2px}
.timer-btns{display:flex;gap:8px;justify-content:center;flex-wrap:wrap}
.btn{padding:9px 20px;border-radius:10px;border:1.5px solid var(--border);background:var(--white);color:var(--text);font-family:'Poppins',Arial,sans-serif;font-size:.85rem;font-weight:700;cursor:pointer;transition:all .15s}
.btn:hover{border-color:var(--blue);color:var(--blue)}
.btn.blue{background:var(--blue);border-color:var(--blue);color:#fff}
.btn.blue:hover{background:var(--blue2)}
.btn.green{background:var(--green);border-color:var(--green);color:#fff}
.timer-lock-msg{display:flex;align-items:center;gap:8px;background:var(--red2);border:1.5px solid #fca5a5;border-radius:10px;padding:10px 14px;margin-top:12px;font-size:.82rem;color:var(--red);font-weight:600}
.quiz-box{background:var(--bg);border:1.5px solid var(--border2);border-radius:14px;padding:18px;margin-top:14px}
.quiz-hdr{font-size:.88rem;font-weight:700;color:var(--amber);margin-bottom:14px;display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.quiz-q{font-size:.9rem;font-weight:600;color:var(--text);margin-bottom:12px;line-height:1.6}
.quiz-opts{display:flex;flex-direction:column;gap:7px}
.qopt{padding:11px 14px;border-radius:10px;border:1.5px solid var(--border2);background:var(--white);color:var(--text2);font-family:'Poppins',Arial,sans-serif;font-size:.87rem;text-align:left;cursor:pointer;transition:all .15s;width:100%}
.qopt:hover:not(.dis){border-color:var(--blue);color:var(--text);background:var(--blue4)}
.qopt.ok{background:var(--green2);border-color:var(--green);color:var(--green)}
.qopt.no{background:var(--red2);border-color:var(--red);color:var(--red)}
.qopt.dis{cursor:default}
.q-fb{margin-top:10px;padding:10px 14px;border-radius:10px;font-size:.83rem;display:none}
.q-fb.show{display:block}
.q-fb.ok{background:var(--green2);color:var(--green);border:1px solid #86efac}
.q-fb.no{background:var(--red2);color:var(--red);border:1px solid #fca5a5}
.quiz-nav{display:flex;justify-content:space-between;align-items:center;margin-top:12px}
.quiz-prog{font-size:.75rem;color:var(--text3)}
.q-score{background:var(--amber2);color:var(--amber);padding:3px 10px;border-radius:99px;font-size:.75rem;font-weight:700}
.quiz-result{text-align:center;padding:14px 0}
.quiz-result .big{font-size:2.2rem;font-weight:700}
.quiz-result .big.ok{color:var(--green)}
.quiz-result .big.bad{color:var(--amber)}
.quiz-result .msg{font-size:.85rem;color:var(--text2);margin:6px 0 14px}
.quiz-hdr .q-needed{background:var(--blue3);color:var(--blue);padding:3px 10px;border-radius:99px;font-size:.72rem;font-weight:700}
.audio-q-wrap{background:var(--blue4);border:1.5px solid var(--blue3);border-radius:12px;padding:14px;margin-bottom:12px;text-align:center}
.audio-play-btn{background:var(--blue);color:#fff;border:none;border-radius:10px;padding:10px 22px;font-family:'Poppins',Arial,sans-serif;font-size:.9rem;font-weight:700;cursor:pointer;display:inline-flex;align-items:center;gap:8px;transition:all .2s}
.audio-play-btn:hover{background:var(--blue2)}
.audio-play-btn.playing{background:var(--green)}
.audio-hint{font-size:.72rem;color:var(--text3);margin-top:6px}
.speech-q-wrap{background:var(--amber2);border:1.5px solid #fcd34d;border-radius:12px;padding:14px;margin-bottom:12px;text-align:center}
.speech-record-btn{background:var(--red);color:#fff;border:none;border-radius:10px;padding:10px 22px;font-family:'Poppins',Arial,sans-serif;font-size:.9rem;font-weight:700;cursor:pointer;display:inline-flex;align-items:center;gap:8px;transition:all .2s;margin:6px}
.speech-record-btn:hover{opacity:.88}
.speech-record-btn.recording{background:#7c3aed;animation:pulse .8s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.7}}
.speech-transcript{font-size:.82rem;color:var(--text2);margin-top:6px;min-height:20px;font-style:italic}
.speech-hint{font-size:.7rem;color:var(--text3);margin-top:4px}
.score-req-msg{background:var(--amber2);border:1.5px solid #fcd34d;border-radius:10px;padding:10px 14px;margin-top:10px;font-size:.82rem;color:var(--amber);font-weight:600;text-align:center}
.complete-btn-wrap{margin-top:14px}
.complete-btn{width:100%;padding:13px;border-radius:12px;border:none;background:linear-gradient(135deg,var(--green),#10b981);color:#fff;font-family:'Poppins',Arial,sans-serif;font-size:.95rem;font-weight:700;cursor:pointer;transition:all .2s;box-shadow:0 2px 8px rgba(5,150,105,.25)}
.complete-btn:hover{transform:translateY(-1px);box-shadow:0 4px 14px rgba(5,150,105,.35)}
.done-stamp{display:flex;align-items:center;justify-content:center;gap:8px;padding:12px;background:var(--green2);border:1.5px solid #86efac;border-radius:12px;color:var(--green);font-size:.88rem;font-weight:700;margin-top:14px}
.day-banner{background:linear-gradient(135deg,var(--green2),var(--blue3));border:1.5px solid var(--green);border-radius:16px;padding:22px;text-align:center;display:none;margin-bottom:16px;box-shadow:var(--shadow2)}
.day-banner.show{display:block}
.day-banner h3{font-size:1.2rem;font-weight:700;color:var(--green);margin-bottom:6px}
.day-banner p{font-size:.88rem;color:var(--text2)}
.locked-day{background:var(--white);border:1.5px solid var(--border2);border-radius:18px;padding:48px;text-align:center;box-shadow:var(--shadow)}
.locked-day .lock-ico{font-size:2.5rem;margin-bottom:12px}
.locked-day p{font-size:.9rem;color:var(--text2)}
.sep{height:1px;background:var(--border2);margin:14px 0}
.half-indicators{display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:14px}
.half-item{display:flex;flex-direction:column;align-items:center;gap:3px;padding:8px 18px;border-radius:12px;border:2px solid var(--border2);background:var(--bg);min-width:90px;transition:all .3s}
.half-item.half-done{background:var(--green2);border-color:var(--green)}
.half-item.half-run{background:var(--blue3);border-color:var(--blue);animation:halfPulse 1.5s infinite}
.half-item.half-wait{opacity:.5}
@keyframes halfPulse{0%,100%{box-shadow:0 0 0 0 rgba(37,99,235,.3)}50%{box-shadow:0 0 0 6px rgba(37,99,235,.0)}}
.half-num{font-size:1.1rem;font-weight:900;color:var(--blue)}
.half-item.half-done .half-num{color:var(--green)}
.half-lbl{font-size:.7rem;color:var(--text2);font-weight:600}
.half-check{font-size:.85rem;color:var(--green)}
.half-sep{font-size:1.2rem;color:var(--text3);font-weight:700}
.alarm-popup{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);z-index:99999;background:#fff;border-radius:20px;padding:30px 36px;text-align:center;box-shadow:0 8px 40px rgba(0,0,0,.25);border:3px solid var(--green);min-width:280px;animation:popIn .3s ease}
@keyframes popIn{from{transform:translate(-50%,-50%) scale(.7);opacity:0}to{transform:translate(-50%,-50%) scale(1);opacity:1}}
.alarm-popup .alarm-ico{font-size:3rem;margin-bottom:10px}
.alarm-popup h3{font-size:1.1rem;font-weight:700;color:var(--green);margin-bottom:8px}
.alarm-popup p{font-size:.85rem;color:var(--text2);margin-bottom:18px}
.alarm-overlay{position:fixed;inset:0;z-index:99998;background:rgba(0,0,0,.4)}
@media(max-width:600px){
  .hero{flex-direction:column;align-items:flex-start}
  .hero-badge{display:none}
  .topbar-right{gap:10px}
  .timer-num{font-size:1.5rem}
}
</style>
</head>
<body>
<div class="wrap">
<div class="topbar">
  <div class="logo">
    <span class="logo-flag">🇫🇷</span>
    <div>
      <div class="logo-title">Apprendre le français</div>
      <div class="logo-sub">30 heures · 10 jours · 3h/jour</div>
    </div>
  </div>
  <div class="topbar-right">
    <div class="ov-stat">
      <div class="ov-val" id="statDays">0/10</div>
      <div class="ov-lbl">Jours</div>
    </div>
    <div class="ov-stat">
      <div class="ov-val" id="statHours">0h</div>
      <div class="ov-lbl">Heures</div>
    </div>
    <div class="ov-ring">
      <svg width="52" height="52" viewBox="0 0 52 52">
        <circle cx="26" cy="26" r="21" fill="none" stroke="#dbeafe" stroke-width="5"/>
        <circle id="ovArc" cx="26" cy="26" r="21" fill="none" stroke="#2563eb" stroke-width="5"
          stroke-dasharray="131.9" stroke-dashoffset="131.9" stroke-linecap="round"
          transform="rotate(-90 26 26)" style="transition:stroke-dashoffset .5s"/>
      </svg>
      <div class="ov-ring-pct" id="ovPct">0%</div>
    </div>
  </div>
</div>
<div class="prog-bar-wrap">
  <div class="prog-labels">
    <span>Progression totale (30 heures)</span>
    <span id="progPct" style="font-weight:700;color:var(--blue)">0%</span>
  </div>
  <div class="prog-track"><div class="prog-fill" id="progFill" style="width:0%"></div></div>
</div>
<div class="tabs-wrap"><div class="tabs" id="tabsEl"></div></div>
<div id="mainEl"></div>
</div>
<script>
// ═══════════════════════════════════════════
// DONNÉES — 10 jours, 3 phases, 12 questions chacune
// Réponses correctes variées (c: 0,1,2,3)
// ═══════════════════════════════════════════
var DAYS=[

{day:1,title:"Culture & Alimentation",topic:"Vocabulaire culinaire et culture quotidienne",
phases:[
  {type:"listen",label:"Écoute",dur:60,
   res:{name:"We Try The Most Popular French Snacks! | Super Easy French 156",url:"https://www.youtube.com/watch?v=xTy21_vWZjY",icon:"▶️"},
   quiz:[
     {q:"ما معنى 'chips à l'ancienne' ؟",opts:["La chocolaterie artisanale","Les gâteaux de riz","Les chips à l'ancienne (رقائق تقليدية)","Le biscuit salé industriel"],c:2,e:"chips à l'ancienne = رقائق البطاطس بالطريقة التقليدية"},
     {q:"ما هو 'Petit Beurre' ؟",opts:["Un biscuit au beurre classique","Un fromage normand","Un pain viennois","Un chocolat noir fin"],c:0,e:"Petit Beurre = بسكويت زبدة فرنسي كلاسيكي شهير جداً"},
     {q:"كيف يقال 'لذيذ' بالفرنسية ؟",opts:["magnifique","superbe","parfait","délicieux"],c:3,e:"délicieux = لذيذ — من أكثر الكلمات استخداماً عند وصف الطعام"},
     {q:"كيف تقول 'أنا جائع' ؟",opts:["Je suis fatigué","J'ai soif","J'ai faim","Je suis malade"],c:2,e:"J'ai faim = أنا جائع | avoir faim = يشعر بالجوع"},
     {q:"كيف تقول 'هذا لذيذ جداً' ؟",opts:["C'est trop cher","C'est vraiment délicieux","C'est trop salé","C'est bizarre"],c:1,e:"C'est vraiment délicieux = هذا لذيذ جداً | vraiment = حقاً"},
     {q:"ما معنى 'croissant' ؟",opts:["Un gâteau au chocolat","Un pain sucré rond","Un type de fromage","Un croissant (معجنة هلالية)"],c:3,e:"le croissant = المعجنة الهلالية — رمز المطبخ الفرنسي الصباحي"},
     {q:"كيف تقول 'أريد المزيد من الخبز' ؟",opts:["Je voudrais plus de pain","Je veux moins de pain","Je n'aime pas le pain","Je cherche du pain"],c:0,e:"Je voudrais plus de pain = أريد المزيد من الخبز | plus de = المزيد من"},
     {q:"ما معنى 'la boulangerie' ؟",opts:["L'épicerie (بقالة)","La boucherie (جزارة)","La boulangerie (مخبز)","La pâtisserie (حلوانية)"],c:2,e:"la boulangerie = المخبز — مكان لا غنى عنه في فرنسا"},
     {q:"كيف تقول 'أريد أن أذوق هذا' ؟",opts:["Je veux cuisiner cela","Je veux jeter cela","Je veux éviter cela","Je veux goûter cela"],c:3,e:"goûter = يذوق | je veux goûter = أريد أن أذوق"},
     {q:"ما معنى 'sans sucre' ؟",opts:["Sans sucre (بدون سكر)","Très sucré","Avec du miel","Peu sucré"],c:0,e:"sans sucre = بدون سكر | sans = بدون — نقيض 'avec'"},
     {q:"كيف تقول 'الفاتورة من فضلك' في مطعم ؟",opts:["Le menu, s'il vous plaît","La cuisine, s'il vous plaît","Un verre d'eau, s'il vous plaît","L'addition, s'il vous plaît"],c:3,e:"l'addition = الفاتورة — تعبير أساسي في المطعم"},
     {q:"ما معنى 'fait maison' ؟",opts:["Fait en usine","Fait maison (محلي الصنع)","Importé de France","Fait à la commande"],c:1,e:"fait maison = محلي الصنع / منزلي — مصطلح يُقدَّر في المطاعم الفرنسية"}
   ]},
  {type:"read",label:"Lecture",dur:60,

     {q:"ما معنى 'réduire les émissions de CO2' ؟",opts:["Augmenter la consommation","Développer l'industrie","Améliorer le transport","Réduire les émissions de CO2 (تقليل انبعاثات ثاني أكسيد الكربون)"],c:3,e:"réduire = يقلل | les émissions = الانبعاثات | CO2 = ثاني أكسيد الكربون"},
     {q:"ما معنى 'la biodiversité' ؟",opts:["La pollution","La déforestation","L'extinction des espèces","La biodiversité (التنوع البيولوجي)"],c:3,e:"la biodiversité = التنوع البيولوجي — تنوع الكائنات الحية، ضروري لتوازن النظم البيئية"},

     {q:"ما معنى 'la déforestation' ؟",opts:["Le reboisement","La préservation des forêts","L'agroforesterie","La déforestation (إزالة الغابات)"],c:3,e:"la déforestation = إزالة الغابات — تهديد خطير للتنوع البيولوجي والمناخ"},
     {q:"كيف تقول 'أنا مهتم/ة بالبيئة' ؟",opts:["L'environnement ne m'intéresse pas","Je suis contre l'écologie","Je suis indifférent(e) à la nature","Je suis sensible à l'environnement"],c:3,e:"être sensible à = مهتم بـ / يُعنى بـ — être 'sensible' à une cause = الاهتمام بها"},

   ]},

     {q:"ما معنى 'agir ensemble pour la planète' ؟",opts:["Parler de l'environnement","Atteindre la durabilité","Protéger les animaux","Agir ensemble pour la planète (التصرف معاً من أجل الكوكب)"],c:3,e:"agir = يتصرف | ensemble = معاً | la planète = الكوكب"},
     {q:"كيف تقول 'أنا مع الطاقات المتجددة' ؟",opts:["Je m'oppose aux énergies vertes","Je préfère les énergies fossiles","Je suis indifférent à l'énergie","Je soutiens les énergies renouvelables"],c:3,e:"soutenir = يدعم / يؤيد — 'je soutiens' = مضارع من 'soutenir'"},
     {q:"كيف تقول 'يجب التصرف الآن' ؟",opts:["Il est trop tard","On peut attendre","Ce n'est pas urgent","Il faut agir maintenant"],c:3,e:"il faut agir maintenant = يجب التصرف الآن — 'il faut' + infinitif = ضرورة"},
     {q:"كيف تقول 'أُقلّل من بصمتي الكربونية' ؟",opts:["J'augmente ma consommation","Je voyage en avion souvent","Je consomme de la viande quotidiennement","Je réduis mon empreinte carbone"],c:3,e:"réduire son empreinte carbone = تقليل بصمتك الكربونية — أكل أقل للحوم، تنقل أخضر..."},
     {q:"كيف تقول 'أنا مع...' ؟",opts:["Je suis contre...","Je suis indifférent à...","Je m'oppose à...","Je suis en faveur de..."],c:3,e:"être en faveur de = يؤيد — مرادف لـ 'soutenir' أو 'être pour'"},
     {q:"كيف تقول 'يجب علينا تغيير عاداتنا' ؟",opts:["Nous pouvons ignorer ce problème","Nous refusons de changer","Nous n'avons pas à changer","Nous devons changer nos habitudes"],c:3,e:"devoir + infinitif = يجب علينا | nos habitudes = عاداتنا"},
     {q:"كيف تقول 'في رأيي، الحل هو...' ؟",opts:["Selon les experts...","D'après les chiffres...","En conclusion...","À mon avis, la solution est..."],c:3,e:"à mon avis = في رأيي — يُستخدم للتعبير عن الرأي الشخصي المباشر"},
     {q:"كيف تقول 'البيئة تخصنا جميعاً' ؟",opts:["L'environnement est un problème lointain","L'environnement ne me concerne pas","L'environnement est un problème d'État","L'environnement nous concerne tous"],c:3,e:"concerner = يخص | nous concerne tous = يخصنا جميعاً"},
     {q:"كيف تقول 'أُفضّل المنتجات المحلية والموسمية' ؟",opts:["Je mange uniquement importé","Je ne fais pas attention à l'origine","Je préfère les produits exotiques","Je préfère les produits locaux et de saison"],c:3,e:"locaux et de saison = محلي وموسمي — يُقلل من بصمة الكربون للغذاء"},
     {q:"كيف تقول 'المستقبل يعتمد على أفعالنا اليوم' ؟",opts:["Le futur ne dépend pas de nous","Nos actions n'ont aucun impact","Il est trop tard pour changer","L'avenir dépend de nos actions aujourd'hui"],c:3,e:"dépendre de = يعتمد على | nos actions = أفعالنا | aujourd'hui = اليوم"}
   ]}
]},

// ÉTAT
// ═══════════════════════════════════════════
var S={cur:1,donePhases:{},doneDays:[],timers:{},tivs:{},quiz:{},open:{}};

// ═══════════════════════════════════════════
// PERSISTANCE LOCALE (localStorage)
// ═══════════════════════════════════════════
function saveState(){
  try{
    var toSave={cur:S.cur,donePhases:S.donePhases,doneDays:S.doneDays,timers:S.timers,quiz:S.quiz,open:S.open};
    localStorage.setItem('fr10_state',JSON.stringify(toSave));
  }catch(e){}
}
function loadState(){
  try{
    var raw=localStorage.getItem('fr10_state');
    if(!raw)return;
    var saved=JSON.parse(raw);
    if(saved.cur)S.cur=saved.cur;
    if(saved.donePhases)S.donePhases=saved.donePhases;
    if(saved.doneDays)S.doneDays=saved.doneDays;
    if(saved.timers)S.timers=saved.timers;
    if(saved.quiz)S.quiz=saved.quiz;
    if(saved.open)S.open=saved.open;
  }catch(e){}
}
loadState();
var PASS_SCORE=8; // 8/12 pour valider

function pk(d,p){return d+"-"+p}
function isDayDone(d){return S.doneDays.indexOf(d)>=0}
function isDayUnlocked(d){return d===1||isDayDone(d-1)}
function isPhaseDone(d,p){return !!S.donePhases[pk(d,p)]}

function updateOverall(){
  var total=30,done=0;
  DAYS.forEach(function(day){
    day.phases.forEach(function(_,pi){if(isPhaseDone(day.day,pi))done++;});
  });
  var pct=Math.round(done/total*100);
  document.getElementById("ovPct").textContent=pct+"%";
  document.getElementById("progPct").textContent=pct+"%";
  document.getElementById("progFill").style.width=pct+"%";
  var c=131.9;
  document.getElementById("ovArc").setAttribute("stroke-dashoffset",c-c*pct/100);
  document.getElementById("statDays").textContent=S.doneDays.length+"/10";
  document.getElementById("statHours").textContent=(S.doneDays.length*3)+"h";
}

function renderTabs(){
  var el=document.getElementById("tabsEl");
  el.innerHTML="";
  DAYS.forEach(function(day){
    var unlocked=isDayUnlocked(day.day);
    var done=isDayDone(day.day);
    var active=day.day===S.cur;
    var cls="tab"+(active?" tactive":done?" tdone":!unlocked?" tlocked":"");
    var dots=day.phases.map(function(ph,pi){
      var on=isPhaseDone(day.day,pi);
      return '<div class="tdot '+ph.type+(on?" on":"")+'"></div>';
    }).join("");
    var btn=document.createElement("div");
    btn.className=cls;
    btn.innerHTML='<span class="tab-num">'+day.day+'</span><span class="tab-lbl">Jour '+day.day+'</span><div class="tab-dots">'+dots+'</div>';
    if(unlocked||done){
      (function(d){btn.onclick=function(){S.cur=d;renderAll();};})(day.day);
    }
    el.appendChild(btn);
  });
}

function renderAll(){renderTabs();renderDay();updateOverall();}

function renderDay(){
  var el=document.getElementById("mainEl");
  var d=S.cur;
  var day=DAYS[d-1];
  if(!isDayUnlocked(d)){
    el.innerHTML='<div class="locked-day"><div class="lock-ico">🔒</div><p>Complétez le Jour '+(d-1)+' pour débloquer ce jour</p></div>';
    return;
  }
  var allDone=day.phases.every(function(_,pi){return isPhaseDone(d,pi);});
  var bannerHtml='<div class="day-banner'+(allDone?" show":"")+'"><h3>🎉 Jour '+d+' terminé !</h3><p>'+(d<10?'Le Jour '+(d+1)+' est maintenant disponible. Bravo !':'🏆 Félicitations ! Programme complet — 30 heures de français !')+'</p></div>';
  var heroHtml='<div class="hero"><div class="hero-l"><div class="hero-num">'+d+'</div><div><div class="hero-title">'+day.title+'</div><div class="hero-topic">'+day.topic+'</div></div></div><div class="hero-badge">⏱ (30+30)×3 = 180 min</div></div>';
  var phasesHtml='<div class="phases">';
  day.phases.forEach(function(ph,pi){phasesHtml+=buildPhase(d,pi,ph);});
  phasesHtml+='</div>';
  el.innerHTML=bannerHtml+heroHtml+phasesHtml;
  day.phases.forEach(function(ph,pi){
    var k=pk(d,pi);
    if(!S.timers[k])S.timers[k]={rem:HALF_SEC,running:false,done:false,half:1,h1done:false};
    updateTimerUI(d,pi);
    renderQuiz(d,pi);
    updateCompleteBtn(d,pi);
  });
}

function buildPhase(d,pi,ph){
  var k=pk(d,pi);
  var done=isPhaseDone(d,pi);
  var isOpen=!!S.open[k];
  var iconMap={listen:"🎧",read:"📖",speak:"🗣️"};
  var durLabel={listen:"30 + 30 min",read:"30 + 30 min",speak:"30 + 30 min"};
  var badge=done
    ?'<span class="pbadge pb-done">✓ Terminé</span>'
    :(isOpen?'<span class="pbadge pb-open">Ouvert</span>':'<span class="pbadge pb-lock">Cliquer pour ouvrir</span>');

  var speakHtml="";
  if(ph.type==="speak"&&ph.topic){
    speakHtml='<div class="speak-box"><div class="speak-lbl">Sujet de conversation</div><div class="speak-text">'+ph.topic+'</div>'+(ph.ref?'<div class="speak-ref">📌 '+ph.ref+'</div>':'')+'</div>';
  }

  var HALF=30*60;
  var ts=S.timers[k]||{rem:HALF,running:false,done:false,half:1,h1done:false};
  var r=46,circ=2*Math.PI*r;
  var arcColor=ph.type==="listen"?"#2563eb":ph.type==="read"?"#059669":"#d97706";
  var offset=circ*(ts.rem/HALF);
  var numCls=ts.done?"done":ts.running?"run":"";
  var startBtnLabel=ts.done?"✓ Terminé":(ts.running?"⏸ Pause":"▶ Démarrer");
  var lockWarning=!done&&!ts.done
    ?'<div class="timer-lock-msg">⚠️ Terminez les deux parties (30+30 min) pour valider</div>'
    :'';

  var h1cls=ts.h1done?"half-done":(ts.half===1&&ts.running?"half-run":"half-wait");
  var h2cls=ts.done?"half-done":(ts.half===2&&ts.running?"half-run":"half-wait");

  var timerHtml='<div class="timer-section">'
    +'<div class="timer-lbl-top">⏱ Minuterie — 30 + 30 minutes</div>'
    +'<div class="half-indicators" id="hind-'+k+'">'
    +'<div class="half-item '+h1cls+'"><span class="half-num">1</span><span class="half-lbl">30 min</span>'+(ts.h1done?'<span class="half-check">✓</span>':'')+'</div>'
    +'<div class="half-sep">→</div>'
    +'<div class="half-item '+h2cls+'"><span class="half-num">2</span><span class="half-lbl">30 min</span>'+(ts.done?'<span class="half-check">✓</span>':'')+'</div>'
    +'</div>'
    +'<div class="timer-ring-wrap">'
    +'<svg width="110" height="110" viewBox="0 0 110 110">'
    +'<circle cx="55" cy="55" r="'+r+'" fill="none" stroke="#e2e8f0" stroke-width="6"/>'
    +'<circle id="tarc-'+k+'" cx="55" cy="55" r="'+r+'" fill="none" stroke="'+arcColor+'" stroke-width="6"'
    +' stroke-linecap="round" stroke-dasharray="'+circ+'" stroke-dashoffset="'+offset+'"'
    +' transform="rotate(-90 55 55)" style="transition:stroke-dashoffset 0.8s linear"/>'
    +'</svg>'
    +'<div class="timer-center">'
    +'<div class="timer-num '+numCls+'" id="tnum-'+k+'">'+fmt(ts.rem)+'</div>'
    +'<div class="timer-sub" id="tlbl-'+k+'">'+(ts.done?"✅ Les deux parties terminées !":(ts.h1done?"2ème partie":"1ère partie"))+'</div>'
    +'</div></div>'
    +'<div class="timer-btns">'
    +'<button class="btn blue" id="tstart-'+k+'" onclick="toggleTimer('+d+','+pi+')"'+(ts.done?" disabled":"")+'>'+startBtnLabel+'</button>'
    +'<button class="btn" onclick="resetTimer('+d+','+pi+')">↺ Réinitialiser</button>'
    +'</div>'
    +lockWarning
    +'</div>';

  var completeHtml=done?'<div class="done-stamp">✅ Cette étape est terminée !</div>':'';

  var bodyHtml='<div class="pbody'+(isOpen?" open":"")+'" id="pbody-'+k+'">'
    +'<div class="res-lbl">'+(ph.type==="listen"?"📺 Lien vidéo":ph.type==="read"?"📰 Lien article":"🎬 Référence conversation")+'</div>'
    +'<a href="'+ph.res.url+'" target="_blank" class="res-link">'
    +'<span class="res-icon">'+ph.res.icon+'</span>'
    +'<div><div class="res-name">'+ph.res.name+'</div><div class="res-url">'+ph.res.url+'</div></div>'
    +'<span class="res-arrow">↗</span>'
    +'</a>'
    +speakHtml
    +'<div class="sep"></div>'
    +timerHtml
    +'<div id="quiz-'+k+'"></div>'
    +completeHtml
    +'</div>';

  return '<div class="pcard'+(done?" pdone":"")+'" id="pcard-'+k+'">'
    +'<div class="ptop" onclick="togglePhase('+d+','+pi+')">'
    +'<div class="picon '+ph.type+'">'+iconMap[ph.type]+'</div>'
    +'<div class="pmeta"><div class="pname">'+ph.label+'</div><div class="pdur">'+durLabel[ph.type]+'</div></div>'
    +badge
    +'</div>'
    +bodyHtml
    +'</div>';
}

window.togglePhase=function(d,pi){
  var k=pk(d,pi);
  S.open[k]=!S.open[k];
  var b=document.getElementById("pbody-"+k);
  if(b)b.classList.toggle("open",S.open[k]);
};

var HALF_SEC=30*60;

function fmt(s){
  var m=Math.floor(s/60),sec=s%60;
  return(m<10?"0":"")+m+":"+(sec<10?"0":"")+sec;
}

function getTimer(k){
  if(!S.timers[k])S.timers[k]={rem:HALF_SEC,running:false,done:false,half:1,h1done:false};
  return S.timers[k];
}

function playAlarmSound(){
  try{
    var ctx=new(window.AudioContext||window.webkitAudioContext)();
    [[880,0,0.15],[880,0.2,0.15],[1100,0.4,0.3]].forEach(function(b){
      var o=ctx.createOscillator(),g=ctx.createGain();
      o.connect(g);g.connect(ctx.destination);
      o.frequency.value=b[0];g.gain.value=0.35;
      o.start(ctx.currentTime+b[1]);o.stop(ctx.currentTime+b[1]+b[2]);
    });
  }catch(e){}
}

function showAlarmPopup(k,d,pi,isLast){
  playAlarmSound();
  if(window.Notification&&Notification.permission==="granted"){
    new Notification(isLast?"✅ Session terminée !":"⏰ 1ère partie terminée !",{
      body:isLast?"Vous avez terminé 30+30 minutes 🎉":"Faites une pause puis commencez la 2ème partie"
    });
  }
  ['_alarmOverlay','_alarmPopup'].forEach(function(id){
    var el=document.getElementById(id);if(el)el.remove();
  });
  var overlay=document.createElement("div");
  overlay.className="alarm-overlay";overlay.id="_alarmOverlay";
  var popup=document.createElement("div");
  popup.className="alarm-popup";popup.id="_alarmPopup";
  if(isLast){
    popup.innerHTML='<div class="alarm-ico">🎉</div>'
      +'<h3>Bravo ! Session terminée</h3>'
      +'<p>Vous avez complété les deux parties<br>30 + 30 minutes ✅</p>'
      +'<button class="btn green" onclick="closeAlarm()">Super ! 👍</button>';
  }else{
    popup.innerHTML='<div class="alarm-ico">⏰</div>'
      +'<h3>1ère partie terminée !</h3>'
      +'<p>Bravo ! 30 minutes complétées 🙌<br>Faites une pause puis commencez la 2ème partie</p>'
      +'<button class="btn blue" onclick="startSecondHalf(\''+k+'\','+d+','+pi+')">▶ Commencer la 2ème partie</button>'
      +'<br><button class="btn" onclick="closeAlarm()" style="margin-top:8px;width:100%">⏸ Plus tard</button>';
  }
  document.body.appendChild(overlay);
  document.body.appendChild(popup);
}

window.closeAlarm=function(){
  ['_alarmOverlay','_alarmPopup'].forEach(function(id){
    var el=document.getElementById(id);if(el)el.remove();
  });
};

window.startSecondHalf=function(k,d,pi){
  closeAlarm();
  var ts=getTimer(k);
  if(ts.done||ts.running||!ts.h1done)return;
  ts.running=true;ts.startedAt=Date.now();ts.initialRem=ts.rem;
  S.tivs[k]=setInterval(function(){
    var elapsed=Math.floor((Date.now()-ts.startedAt)/1000);
    ts.rem=Math.max(0,ts.initialRem-elapsed);
    updateTimerUI(d,pi);saveState();
    if(ts.rem<=0){
      clearInterval(S.tivs[k]);delete S.tivs[k];
      ts.running=false;ts.done=true;ts.startedAt=null;
      saveState();updateTimerUI(d,pi);updateCompleteBtn(d,pi);
      var lw=document.querySelector("#pbody-"+k+" .timer-lock-msg");
      if(lw)lw.remove();
      showAlarmPopup(k,d,pi,true);
    }
  },500);
  updateTimerUI(d,pi);
};

window.toggleTimer=function(d,pi){
  var k=pk(d,pi);
  var ts=getTimer(k);
  if(ts.done)return;
  if(S.tivs[k]){
    // PAUSE: save remaining time based on real elapsed
    clearInterval(S.tivs[k]);delete S.tivs[k];
    if(ts.startedAt){ts.rem=Math.max(0,ts.initialRem-Math.floor((Date.now()-ts.startedAt)/1000));}
    ts.running=false;ts.startedAt=null;ts.initialRem=ts.rem;
    saveState();updateTimerUI(d,pi);return;
  }
  if(ts.h1done&&ts.half===2&&!ts.running){startSecondHalf(k,d,pi);return;}
  if(window.Notification&&Notification.permission==="default"){Notification.requestPermission();}
  ts.running=true;ts.startedAt=Date.now();ts.initialRem=ts.rem;
  S.tivs[k]=setInterval(function(){
    var elapsed=Math.floor((Date.now()-ts.startedAt)/1000);
    ts.rem=Math.max(0,ts.initialRem-elapsed);
    updateTimerUI(d,pi);saveState();
    if(ts.rem<=0){
      clearInterval(S.tivs[k]);delete S.tivs[k];
      ts.running=false;ts.startedAt=null;ts.h1done=true;ts.half=2;ts.rem=HALF_SEC;ts.initialRem=HALF_SEC;
      saveState();updateTimerUI(d,pi);showAlarmPopup(k,d,pi,false);
    }
  },500);
  updateTimerUI(d,pi);
};

window.resetTimer=function(d,pi){
  var k=pk(d,pi);
  if(S.tivs[k]){clearInterval(S.tivs[k]);delete S.tivs[k];}
  S.timers[k]={rem:HALF_SEC,running:false,done:false,half:1,h1done:false,startedAt:null,initialRem:HALF_SEC};
  saveState();updateTimerUI(d,pi);updateCompleteBtn(d,pi);
};

function timerDone(d,pi){var ts=S.timers[pk(d,pi)];return !!(ts&&ts.done);}

function updateTimerUI(d,pi){
  var k=pk(d,pi);
  var ts=getTimer(k);
  var r=46,circ=2*Math.PI*r;
  var numEl=document.getElementById("tnum-"+k);
  var arcEl=document.getElementById("tarc-"+k);
  var startEl=document.getElementById("tstart-"+k);
  var lblEl=document.getElementById("tlbl-"+k);
  var hindEl=document.getElementById("hind-"+k);
  if(numEl){
    numEl.textContent=fmt(ts.rem);
    numEl.className="timer-num"+(ts.done?" done":ts.running?" run":"");
  }
  if(arcEl)arcEl.setAttribute("stroke-dashoffset",circ*(ts.rem/HALF_SEC));
  if(startEl){
    if(ts.done){startEl.textContent="✓ Terminé";startEl.disabled=true;}
    else if(ts.h1done&&!ts.running)startEl.textContent="▶ 2ème partie";
    else startEl.textContent=ts.running?"⏸ Pause":"▶ Démarrer";
    startEl.disabled=false;
    if(ts.done)startEl.disabled=true;
  }
  if(lblEl){
    if(ts.done)lblEl.textContent="✅ Les deux parties terminées !";
    else if(ts.h1done)lblEl.textContent="2ème partie — 30 min";
    else lblEl.textContent="1ère partie — 30 min";
  }
  if(hindEl){
    var h1cls=ts.h1done?"half-done":(ts.half===1&&ts.running?"half-run":"half-wait");
    var h2cls=ts.done?"half-done":(ts.half===2&&ts.running?"half-run":ts.h1done?"half-wait":"half-wait");
    hindEl.innerHTML=
      '<div class="half-item '+h1cls+'"><span class="half-num">1</span><span class="half-lbl">30 min</span>'+(ts.h1done?'<span class="half-check">✓</span>':'')+'</div>'
      +'<div class="half-sep">→</div>'
      +'<div class="half-item '+h2cls+'"><span class="half-num">2</span><span class="half-lbl">30 min</span>'+(ts.done?'<span class="half-check">✓</span>':'')+'</div>';
  }
}

// ═══════════════════════════════════════════
// QUIZ — 12 questions, besoin de 8/12
// ═══════════════════════════════════════════
function quizPassed(d,pi){
  var k=pk(d,pi);var qs=S.quiz[k];
  return qs&&qs.finished&&qs.score>=PASS_SCORE;
}

function renderQuiz(d,pi){
  var k=pk(d,pi);
  var ph=DAYS[d-1].phases[pi];
  var el=document.getElementById("quiz-"+k);
  if(!el)return;
  if(!S.quiz[k])S.quiz[k]={cur:0,score:0,answered:[],finished:false};
  var qs=S.quiz[k];
  var quiz=ph.quiz;

  if(qs.finished){
    var passed=qs.score>=PASS_SCORE;
    el.innerHTML='<div class="quiz-box"><div class="quiz-result">'
      +'<div class="big '+(passed?"ok":"bad")+'">'+qs.score+'/'+quiz.length+'</div>'
      +'<div class="msg">'+(passed?"🌟 Excellent ! Quiz réussi ("+qs.score+"/"+quiz.length+")":"⚠️ Il faut "+PASS_SCORE+"/"+quiz.length+" pour réussir — score : "+qs.score)+'</div>'
      +(passed
        ?'<div style="background:var(--green2);color:var(--green);padding:8px 14px;border-radius:8px;font-size:.82rem;font-weight:700;margin-bottom:10px">✅ Bouton de validation déverrouillé — validez l\'étape !</div>'
        :'<div style="background:var(--red2);color:var(--red);padding:8px 14px;border-radius:8px;font-size:.82rem;font-weight:700;margin-bottom:10px">❌ Quiz non réussi — réessayez</div>')
      +'<button class="btn" onclick="resetQuiz('+d+','+pi+')">🔄 Recommencer le quiz</button>'
      +'</div></div>';
    updateCompleteBtn(d,pi);
    return;
  }

  if(qs.cur>=quiz.length){qs.finished=true;renderQuiz(d,pi);return;}

  var q=quiz[qs.cur];
  var ans=qs.answered[qs.cur];
  var fbShow=ans!==undefined?" show":"";
  var fbCls=ans!==undefined?(ans===q.c?" ok":" no"):"";
  var fbText=ans!==undefined?(ans===q.c?"✅ Correct ! "+q.e:"❌ Réponse : "+q.opts[q.c]+" — "+q.e):"";

  var questionArea="";
  if(ph.type==="listen"){
    var sentence=q.sentence||q.q;
    questionArea='<div class="audio-q-wrap">'
      +'<div style="font-size:.8rem;color:var(--blue);font-weight:700;margin-bottom:8px">🎧 Écoutez la phrase puis choisissez sa signification</div>'
      +'<button class="audio-play-btn" id="audiobtn-'+k+'-'+qs.cur+'" onclick="playAudio(\''+sentence.replace(/\\/g,'\\\\').replace(/'/g,"\\'")+'\',' +'\'audiobtn-'+k+'-'+qs.cur+'\')">'
      +'🔊 Écouter</button>'
      +'<div class="audio-hint">Appuyez pour écouter, puis choisissez la bonne réponse</div>'
      +'</div>'
      +'<div class="quiz-q">'+q.q+'</div>';
  }else if(ph.type==="speak"){
    var sentence2=q.sentence||q.q;
    questionArea='<div class="speech-q-wrap">'
      +'<div class="speak-lbl">🗣️ Écoutez la question et essayez de répondre à l\'oral</div>'
      +'<button class="audio-play-btn" id="spkbtn-'+k+'-'+qs.cur+'" onclick="playAudio(\''+sentence2.replace(/\\/g,'\\\\').replace(/'/g,"\\'")+'\',' +'\'spkbtn-'+k+'-'+qs.cur+'\')">'
      +'🔊 Écouter la question</button>'
      +'<div style="margin-top:10px">'
      +'<button class="speech-record-btn" id="recbtn-'+k+'-'+qs.cur+'" onclick="toggleRecord(\''+k+'\','+qs.cur+')">'
      +'🎤 Enregistrer votre réponse</button>'
      +'<div class="speech-transcript" id="transcript-'+k+'-'+qs.cur+'">—</div>'
      +'</div>'
      +'<div class="speech-hint">Après l\'enregistrement, choisissez la bonne réponse ci-dessous</div>'
      +'</div>'
      +'<div class="quiz-q">'+q.q+'</div>';
  }else{
    questionArea='<div class="quiz-q">'+(qs.cur+1)+'. '+q.q+'</div>';
  }

  var optsHtml=q.opts.map(function(opt,oi){
    var cls="qopt"+(ans!==undefined?" dis":"");
    if(ans!==undefined){if(oi===q.c)cls+=" ok";else if(oi===ans)cls+=" no";}
    return'<button class="'+cls+'" onclick="answerQ('+d+','+pi+','+oi+')">'+opt+'</button>';
  }).join("");

  el.innerHTML='<div class="quiz-box">'
    +'<div class="quiz-hdr">📝 Quiz — '
    +'<span class="q-score">'+qs.score+'/'+quiz.length+'</span>'
    +'<span class="q-needed">Requis : '+PASS_SCORE+'/'+quiz.length+'</span>'
    +'</div>'
    +questionArea
    +'<div class="quiz-opts">'+optsHtml+'</div>'
    +'<div class="q-fb'+fbCls+fbShow+'">'+fbText+'</div>'
    +'<div class="quiz-nav"><span class="quiz-prog">Question '+(qs.cur+1)+' / '+quiz.length+'</span>'
    +(ans!==undefined?'<button class="btn blue" onclick="nextQ('+d+','+pi+')">Suivant →</button>':'')
    +'</div></div>';
}

window.playAudio=function(text,btnId){
  if(!window.speechSynthesis)return alert("Votre navigateur ne supporte pas la synthèse vocale");
  window.speechSynthesis.cancel();
  var btn=document.getElementById(btnId);
  if(btn){btn.textContent="⏳ Lecture...";btn.classList.add("playing");}
  var u=new SpeechSynthesisUtterance(text);
  u.lang="fr-FR";u.rate=0.85;u.pitch=1;
  var voices=window.speechSynthesis.getVoices();
  var frVoice=voices.find(function(v){return v.lang.startsWith("fr");});
  if(frVoice)u.voice=frVoice;
  u.onend=function(){if(btn){btn.textContent="🔊 Réécouter";btn.classList.remove("playing");}};
  u.onerror=function(){if(btn){btn.textContent="🔊 Écouter";btn.classList.remove("playing");}};
  window.speechSynthesis.speak(u);
};

if(window.speechSynthesis){
  window.speechSynthesis.onvoiceschanged=function(){window.speechSynthesis.getVoices();};
}

var _recState={rec:null,active:null};
window.toggleRecord=function(k,qi){
  var btnId="recbtn-"+k+"-"+qi;
  var transId="transcript-"+k+"-"+qi;
  var btn=document.getElementById(btnId);
  var trans=document.getElementById(transId);
  if(!window.SpeechRecognition&&!window.webkitSpeechRecognition){
    if(trans)trans.textContent="⚠️ Votre navigateur ne supporte pas l'enregistrement — choisissez directement";
    return;
  }
  if(_recState.rec&&_recState.active===k+"-"+qi){_recState.rec.stop();return;}
  var SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  var rec=new SR();
  rec.lang="fr-FR";rec.interimResults=true;rec.maxAlternatives=1;
  _recState.rec=rec;_recState.active=k+"-"+qi;
  if(btn){btn.textContent="⏹ Arrêter l'enregistrement";btn.classList.add("recording");}
  rec.onresult=function(e){
    var t=Array.from(e.results).map(function(r){return r[0].transcript;}).join(" ");
    if(trans)trans.textContent="🎤 Entendu : "+t;
  };
  rec.onend=function(){
    _recState.rec=null;_recState.active=null;
    if(btn){btn.textContent="🎤 Réenregistrer";btn.classList.remove("recording");}
  };
  rec.onerror=function(){
    if(trans)trans.textContent="⚠️ Rien entendu — choisissez la réponse dans la liste";
    if(btn){btn.textContent="🎤 Réenregistrer";btn.classList.remove("recording");}
  };
  rec.start();
};

window.answerQ=function(d,pi,oi){
  var k=pk(d,pi);var qs=S.quiz[k];
  if(qs.answered[qs.cur]!==undefined)return;
  qs.answered[qs.cur]=oi;
  if(oi===DAYS[d-1].phases[pi].quiz[qs.cur].c)qs.score++;
  saveState();renderQuiz(d,pi);
};
window.nextQ=function(d,pi){
  var k=pk(d,pi);S.quiz[k].cur++;saveState();renderQuiz(d,pi);
};
window.resetQuiz=function(d,pi){
  S.quiz[pk(d,pi)]={cur:0,score:0,answered:[],finished:false};
  saveState();renderQuiz(d,pi);updateCompleteBtn(d,pi);
};

function updateCompleteBtn(d,pi){
  var k=pk(d,pi);
  var tDone=timerDone(d,pi);
  var qPass=quizPassed(d,pi);
  var phaseDone=isPhaseDone(d,pi);
  var pbody=document.getElementById("pbody-"+k);
  if(!pbody)return;
  var existing=pbody.querySelector(".complete-btn-wrap,.done-stamp,.score-req-msg");
  if(existing)existing.remove();
  if(phaseDone){
    var stamp=document.createElement("div");
    stamp.className="done-stamp";
    stamp.textContent="✅ Cette étape est terminée !";
    pbody.appendChild(stamp);
  }else if(tDone&&qPass){
    var wrap=document.createElement("div");
    wrap.className="complete-btn-wrap";
    wrap.innerHTML='<button class="complete-btn" onclick="completePhase('+d+','+pi+')">✓ Valider cette étape</button>';
    pbody.appendChild(wrap);
  }else if(tDone&&!qPass){
    var msg=document.createElement("div");
    msg.className="score-req-msg";
    var qs=S.quiz[k];var sc=qs?qs.score:0;
    msg.textContent="⚠️ Minuterie terminée ✓ — Il faut "+PASS_SCORE+"/12 bonnes réponses (score : "+sc+"/12). Complétez le quiz d'abord !";
    pbody.appendChild(msg);
  }
}

window.completePhase=function(d,pi){
  if(!timerDone(d,pi)){alert("Vous devez d'abord terminer la minuterie !");return;}
  if(!quizPassed(d,pi)){alert("Vous devez réussir le quiz avec "+PASS_SCORE+"/12 bonnes réponses !");return;}
  S.donePhases[pk(d,pi)]=true;
  var day=DAYS[d-1];
  if(day.phases.every(function(_,i){return isPhaseDone(d,i);})&&!isDayDone(d)){
    S.doneDays.push(d);
  }
  saveState();renderAll();
};

if('serviceWorker' in navigator){
  window.addEventListener('load',function(){
    navigator.serviceWorker.register('./sw.js').catch(function(){});
  });
}

// ═══════════════════════════════════════════
// VISIBILITÉ DE PAGE — le timer continue même si on change d'onglet
// ═══════════════════════════════════════════
document.addEventListener('visibilitychange',function(){
  if(document.hidden){
    // Page cachée : sauvegarder l'état avec timestamp
    Object.keys(S.tivs).forEach(function(k){
      var ts=S.timers[k];
      if(ts&&ts.running&&ts.startedAt){
        ts.rem=Math.max(0,ts.initialRem-Math.floor((Date.now()-ts.startedAt)/1000));
        saveState();
      }
    });
  }else{
    // Page visible : resynchroniser et redémarrer les intervalles
    Object.keys(S.timers).forEach(function(k){
      var ts=S.timers[k];
      if(ts&&ts.running&&!ts.done){
        var parts=k.split('-');
        var d=parseInt(parts[0]);var pi=parseInt(parts[1]);
        // Calculer le temps réel écoulé depuis la dernière sauvegarde
        if(ts.startedAt){
          ts.rem=Math.max(0,ts.initialRem-Math.floor((Date.now()-ts.startedAt)/1000));
        }
        // Si le timer a expiré pendant l'absence
        if(ts.rem<=0){
          if(S.tivs[k]){clearInterval(S.tivs[k]);delete S.tivs[k];}
          if(!ts.h1done){
            ts.running=false;ts.h1done=true;ts.half=2;ts.rem=HALF_SEC;ts.initialRem=HALF_SEC;ts.startedAt=null;
            saveState();updateTimerUI(d,pi);showAlarmPopup(k,d,pi,false);
          }else{
            ts.running=false;ts.done=true;ts.startedAt=null;
            saveState();updateTimerUI(d,pi);updateCompleteBtn(d,pi);
            showAlarmPopup(k,d,pi,true);
          }
          return;
        }
        // Reprendre l'intervalle avec un nouveau timestamp
        if(S.tivs[k]){clearInterval(S.tivs[k]);delete S.tivs[k];}
        ts.startedAt=Date.now();ts.initialRem=ts.rem;
        (function(key,dd,pii,timer){
          S.tivs[key]=setInterval(function(){
            var el=Math.floor((Date.now()-timer.startedAt)/1000);
            timer.rem=Math.max(0,timer.initialRem-el);
            updateTimerUI(dd,pii);saveState();
            if(timer.rem<=0){
              clearInterval(S.tivs[key]);delete S.tivs[key];
              timer.running=false;timer.startedAt=null;
              if(!timer.h1done){
                timer.h1done=true;timer.half=2;timer.rem=HALF_SEC;timer.initialRem=HALF_SEC;
                saveState();updateTimerUI(dd,pii);showAlarmPopup(key,dd,pii,false);
              }else{
                timer.done=true;saveState();updateTimerUI(dd,pii);updateCompleteBtn(dd,pii);
                showAlarmPopup(key,dd,pii,true);
              }
            }
          },500);
        })(k,d,pi,ts);
        updateTimerUI(d,pi);
      }
    });
  }
});

// ═══════════════════════════════════════════
// RESTAURER LES TIMERS ACTIFS AU CHARGEMENT
// ═══════════════════════════════════════════
Object.keys(S.timers).forEach(function(k){
  var ts=S.timers[k];
  if(ts&&ts.running&&!ts.done&&ts.startedAt){
    var parts=k.split('-');
    var d=parseInt(parts[0]);var pi=parseInt(parts[1]);
    var elapsed=Math.floor((Date.now()-ts.startedAt)/1000);
    ts.rem=Math.max(0,ts.initialRem-elapsed);
    if(ts.rem<=0){
      if(!ts.h1done){
        ts.running=false;ts.h1done=true;ts.half=2;ts.rem=HALF_SEC;ts.initialRem=HALF_SEC;ts.startedAt=null;
      }else{
        ts.running=false;ts.done=true;ts.startedAt=null;
      }
      saveState();
    }else{
      ts.startedAt=Date.now();ts.initialRem=ts.rem;
      (function(key,dd,pii,timer){
        S.tivs[key]=setInterval(function(){
          var el=Math.floor((Date.now()-timer.startedAt)/1000);
          timer.rem=Math.max(0,timer.initialRem-el);
          updateTimerUI(dd,pii);saveState();
          if(timer.rem<=0){
            clearInterval(S.tivs[key]);delete S.tivs[key];
            timer.running=false;timer.startedAt=null;
            if(!timer.h1done){
              timer.h1done=true;timer.half=2;timer.rem=HALF_SEC;timer.initialRem=HALF_SEC;
              saveState();updateTimerUI(dd,pii);showAlarmPopup(key,dd,pii,false);
            }else{
              timer.done=true;saveState();updateTimerUI(dd,pii);updateCompleteBtn(dd,pii);
              showAlarmPopup(key,dd,pii,true);
            }
          }
        },500);
      })(k,d,pi,ts);
    }
  }
});

renderAll();
</script>
